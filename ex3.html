<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercício Bootstrap 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <form>
        <div class="container" style="margin-top: 5px;">
            <div class="row">
                <div class="col-3">
                    <label for="name" class="form-label">Partner Name</label>
                </div>
                <div class="col-3">
                    <input type="text" class="form-control id=name">
                </div>
                <div class="col-3">
                    <label for="email" class="form-label">Partner Email ID</label>
                </div>
                <div class="col-3">
                    <input type="email" class="form-control id=email">
                </div>
            </div>
        </div>

        <div class="container" style="margin-top: 5px;">
            <div class="row">
                <div class="col-3">
                    <label for="name2" class="form-label">Partner Legal Name</label>
                </div>
                <div class="col-3">
                    <input type="text" class="form-control id=name">
                </div>
                <div class="col-3">
                    <label for="mobile" class="form-label">Partner Mobile</label>
                </div>
                <div class="col-3">
                    <input type="text" class="form-control id=mobile">
                </div>
            </div>
        </div>

        <div class="container" style="margin-top: 5px;">
            <div class="row">
                <div class="col-3">
                    <label for="adress" class="form-label">Partner Adress</label>
                </div>
                <div class="col">
                    <textarea class="form-control" id="adress"></textarea>
                </div>
            </div>
        </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                crossorigin="anonymous"></script>
        </div>
    </form>
</body>

</html>
